<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/favicon.ico">
    <title>你要 v 我 50 吗</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <div class="bg-layer" id="bgLayer"></div>
    <div class="overlay"></div>

    <main>
        <section class="hero" id="hero">
            <div class="hero-content">
                <h1>相册</h1>
                <p class="subtitle">v 我 50 吃疯狂星期四</p>
                <button class="pay-toggle" id="payToggleBtn" type="button" aria-expanded="false"
                    aria-controls="payGrid">v 我 50</button>

                <div class="pay-grid is-collapsed" id="payGrid">
                    <article class="pay-card reveal">
                        <h2>微信</h2>
                        <img src="/pay_wx.jpg" alt="微信收款码">
                    </article>
                    <article class="pay-card reveal">
                        <h2>支付宝</h2>
                        <img src="/pay_zfb.png" alt="支付宝收款码">
                    </article>
                </div>
            </div>
        </section>

        <section class="folders" id="folders">
            <div class="section-header">
                <h2>我的相册</h2>
                <p>点击查看相册及其图文介绍</p>
            </div>
            <div class="folder-grid" id="folderGrid"></div>
        </section>
        <!-- Album viewer (hidden by default). -->
        <section class="album-viewer" id="albumViewer" style="display:none;">
            <div class="viewer">
                <a class="back-home" href="./" aria-label="返回主页">返回主页</a>
                <button class="nav nav-prev" id="prevBtn" aria-label="上一张">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>

                <div class="track-wrap">
                    <div class="track" id="track" role="list"></div>
                </div>

                <button class="nav nav-next" id="nextBtn" aria-label="下一张">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>

            <div class="lightbox" id="lightbox" aria-hidden="true">
                <div class="lb-inner" role="dialog" aria-modal="true">
                    <button class="lb-close" id="lbClose" aria-label="关闭">✕</button>
                    <div class="lb-media">
                        <img id="lbImage" alt="">
                    </div>
                    <div class="lb-info">
                        <h3 id="lbTitle"></h3>
                        <p id="lbDesc"></p>
                    </div>
                </div>
            </div>
        </section>


    </main>

    <script src="./main.js"></script>
    <script>
        (function () {
            const params = new URLSearchParams(location.search);
            const album = params.get('album') || params.get('a');
            if (!album) return;

            document.documentElement.classList.add('album-mode');
            document.body.classList.add('album-mode');

            // hide homepage sections
            const hero = document.getElementById('hero');
            const folders = document.getElementById('folders');
            hero && (hero.style.display = 'none');
            folders && (folders.style.display = 'none');

            // show album viewer
            const viewer = document.getElementById('albumViewer');
            if (viewer) viewer.style.display = 'block';

            function normalizeAlbumKey(value) {
                if (!value) return '';
                let key = String(value).trim();
                try { key = decodeURIComponent(key); } catch (e) { }
                key = key.replace(/^\.\//, '').replace(/^\/+/, '').replace(/\/+$/, '');
                if (key.startsWith('album/')) key = key.substring(6);
                return key;
            }

            const albumKey = normalizeAlbumKey(album);
            document.title = albumKey + ' - 相册';

            async function setAlbumTitleFromIndex() {
                try {
                    const res = await fetch('./albums.json', { cache: 'no-store' });
                    if (!res.ok) return;
                    const list = await res.json();
                    if (!Array.isArray(list)) return;
                    const found = list.find((item) => normalizeAlbumKey(item && item.href) === albumKey);
                    if (found && found.title) {
                        document.title = found.title + ' - 相册';
                    }
                } catch (e) { }
            }

            setAlbumTitleFromIndex();

            function loadAlbumScript() {
                if (document.getElementById('albumTemplateScript')) return;
                const s = document.createElement('script');
                s.id = 'albumTemplateScript';
                s.src = './album-template/main.js';
                document.body.appendChild(s);
            }

            // load album-template CSS first, then run script to avoid initial layout mismatch
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = './album-template/styles.css';
            link.onload = loadAlbumScript;
            document.head.appendChild(link);

            // fallback for edge cases where onload may not fire
            setTimeout(loadAlbumScript, 1200);
        })();
    </script>
</body>

</html>
